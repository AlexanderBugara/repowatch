<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RepoWatch — Subscribe to releases</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      padding: 2rem;
      width: 100%;
      max-width: 400px;
    }
    h1 { font-size: 1.25rem; margin-bottom: 1rem; }
    label { display: block; font-size: 0.875rem; margin-bottom: 0.25rem; color: #555; }
    input {
      width: 100%;
      padding: 0.5rem 0.75rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 1rem;
      margin-bottom: 1rem;
    }
    input:focus { outline: none; border-color: #0070f3; }
    button {
      width: 100%;
      padding: 0.6rem;
      background: #0070f3;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 1rem;
      cursor: pointer;
    }
    button:hover { background: #005bb5; }
    #message { margin-top: 1rem; font-size: 0.9rem; }
    .success { color: #16a34a; }
    .error   { color: #dc2626; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Subscribe to GitHub releases</h1>
    <form id="form">
      <label for="email">Email</label>
      <input id="email" name="email" type="email" placeholder="you@example.com" required>
      <label for="repo">Repository</label>
      <input id="repo" name="repo" type="text" placeholder="owner/repo" required>
      <button type="submit">Subscribe</button>
    </form>
    <div id="message"></div>
  </div>
  <script>
    document.getElementById('form').addEventListener('submit', async function(e) {
      e.preventDefault();
      const msg = document.getElementById('message');
      msg.textContent = '';
      msg.className = '';
      const body = new FormData(this);
      try {
        const res = await fetch('/api/subscribe', { method: 'POST', body });
        const data = await res.json();
        if (res.ok) {
          msg.textContent = data.message;
          msg.className = 'success';
          this.reset();
        } else {
          msg.textContent = data.error || 'Something went wrong.';
          msg.className = 'error';
        }
      } catch {
        msg.textContent = 'Network error. Please try again.';
        msg.className = 'error';
      }
    });
  </script>
</body>
</html>
