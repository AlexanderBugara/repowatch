name: CI

on:
  push:
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: genesis_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: Lint
        run: go vet ./...

      - name: Unit tests
        run: go test ./...

      - name: Integration tests
        env:
          TEST_DATABASE_URL: "postgres://postgres:postgres@localhost:5432/genesis_test?sslmode=disable"
        run: go test ./... -run TestIntegration -count=1
