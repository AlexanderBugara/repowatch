version: '3.8'

services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      HOST: "localhost:8080"
      DATABASE_URL: "postgres://postgres:postgres@postgres:5432/genesis?sslmode=disable"
      SMTP_HOST: "mailhog"
      SMTP_PORT: "1025"
      SMTP_FROM: "noreply@genesis.app"
      GITHUB_TOKEN: "${GITHUB_TOKEN:-}"
      SCAN_INTERVAL: "${SCAN_INTERVAL:-10m}"
    depends_on:
      postgres:
        condition: service_healthy
      mailhog:
        condition: service_started
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: genesis
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d genesis"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI

volumes:
  pgdata:
